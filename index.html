<style>
  :root {
    --cream:      #F4EBE5;
    --ivory:      #F8F5F2;
    --periwinkle: #7D86B3;
    --lavender:   #C8BDD9;
    --powder:     #DDEFFD;
    --teal:       #A8D5D2;
    --aqua:       #C5F5F3;
    --taupe:      #7A6B63;
    --chocolate:  #4B4641;
    --grad-brand: linear-gradient(135deg, #C8BDD9 0%, #7D86B3 100%);
    --grad-soft:  linear-gradient(135deg, #F4EBE5 0%, #DDEFFD 50%, #C8BDD9 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #F4EBE5 0%, #DDEFFD 40%, #C8BDD9 70%, #7D86B3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 {
    width: 420px; height: 420px;
    top: -140px; right: -100px;
    background: radial-gradient(circle, rgba(168,213,210,.3), transparent 70%);
    animation-delay: 0s;
  }
  .orb-2 {
    width: 280px; height: 280px;
    bottom: -80px; left: -60px;
    background: radial-gradient(circle, rgba(200,189,217,.35), transparent 70%);
    animation-delay: -3s;
  }
  .orb-3 {
    width: 200px; height: 200px;
    top: 40%; left: -80px;
    background: radial-gradient(circle, rgba(221,239,253,.4), transparent 70%);
    animation-delay: -5s;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-18px) scale(1.04); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    background: #7D86B3;
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 2rem;
    padding: 2.8rem 2.2rem;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 8px 32px rgba(125,134,179,.25),
      0 32px 80px rgba(125,134,179,.2),
      inset 0 1px 0 rgba(255,255,255,.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp .8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Watermark */
  .watermark {
    position: absolute;
    bottom: 14px; right: 18px;
    width: 56px; height: 56px;
    opacity: .15;
    pointer-events: none;
    z-index: 0;
  }

  /* Logo */
  .card-logo {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(125,134,179,.3);
    box-shadow:
      0 0 0 4px rgba(200,189,217,.2),
      0 8px 24px rgba(125,134,179,.2);
    margin-bottom: 1.3rem;
    position: relative; z-index: 1;
  }

  /* Name */
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    color: #F4EBE5;
    line-height: 1;
    letter-spacing: .02em;
    text-align: center;
    position: relative; z-index: 1;
  }

  /* Title */
  .card-title {
    font-size: .72rem;
    color: rgba(244,235,229,.8);
    letter-spacing: .14em;
    text-transform: uppercase;
    font-weight: 500;
    text-align: center;
    margin-top: .45rem;
    position: relative; z-index: 1;
  }

  /* Studio name */
  .card-studio {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: rgba(244,235,229,.75);
    text-align: center;
    margin-top: .2rem;
    position: relative; z-index: 1;
    letter-spacing: .06em;
  }

  /* Divider */
  .divider {
    width: 180px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), rgba(255,255,255,.6), rgba(255,255,255,.4), transparent);
    margin: 1.4rem 0;
    position: relative; z-index: 1;
  }

  /* Contacts */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: .5rem;
    width: 100%;
    margin-bottom: 1.4rem;
    position: relative; z-index: 1;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: .75rem;
    font-size: .84rem;
    color: rgba(244,235,229,.85);
    text-decoration: none;
    padding: .5rem .75rem;
    border-radius: .6rem;
    transition: background .2s, color .2s;
  }
  .contact-item:hover {
    background: rgba(244,235,229,.1);
    color: #F4EBE5;
  }

  .contact-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(244,235,229,.15);
    border: 1px solid rgba(244,235,229,.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg { width: 14px; height: 14px; }

  /* Buttons */
  .actions {
    display: flex;
    flex-direction: column;
    gap: .75rem;
    width: 100%;
    position: relative; z-index: 1;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .6rem;
    width: 100%;
    padding: .9rem 1.5rem;
    border-radius: 3rem;
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    font-weight: 500;
    letter-spacing: .04em;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: transform .2s, opacity .2s, box-shadow .2s;
  }
  .btn:hover { transform: translateY(-2px); }

  .btn-primary {
    background: #F4EBE5;
    color: #7D86B3;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
  }
  .btn-primary:hover { box-shadow: 0 6px 28px rgba(125,134,179,.45); }

  .btn-tertiary {
    background: transparent;
    color: #F4EBE5;
    border: 1px solid rgba(244,235,229,.4);
    font-size: .82rem;
  }
  .btn-tertiary:hover {
    background: rgba(244,235,229,.15);
    color: #F4EBE5;
  }

  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Tagline */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: .95rem;
    font-style: italic;
    color: rgba(244,235,229,.75);
    text-align: center;
    margin-top: 1.5rem;
    letter-spacing: .04em;
    position: relative; z-index: 1;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(75,70,65,.3);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 2rem;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(125,134,179,.2);
    border-radius: 1.5rem;
    padding: 2rem;
    max-width: 340px; width: 100%;
    text-align: center;
    animation: fadeUp .3s ease;
    box-shadow: 0 16px 48px rgba(125,134,179,.2);
  }

  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem; font-weight: 400;
    color: var(--chocolate);
    margin-bottom: .5rem;
  }

  .modal p {
    font-size: .82rem;
    color: var(--chocolate);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .modal-btns { display: flex; flex-direction: column; gap: .6rem; }

  .modal-close {
    background: transparent;
    border: 1px solid rgba(125,134,179,.2);
    color: var(--chocolate);
    padding: .6rem;
    border-radius: 2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    cursor: pointer;
    margin-top: .3rem;
    transition: background .2s;
  }
  .modal-close:hover { background: rgba(125,134,179,.08); }
</style>
</head>

<script>
  async function shareCard() {
    const shareData = {
      title: 'Melissa | Brand Glow Studio',
      text: 'Check out my digital business card!',
      url: window.location.href
    };
    if (navigator.share) {
      try { await navigator.share(shareData); } catch(e) { copyLink(); }
    } else { copyLink(); }
  }

  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.querySelector('.btn-tertiary');
      const original = btn.innerHTML;
      btn.innerHTML = '✓ Link Copied!';
      setTimeout(() => btn.innerHTML = original, 2000);
    });
  }

  function openContactModal() {
    document.getElementById('contactModal').classList.add('active');
  }
  function closeContactModal() {
    document.getElementById('contactModal').classList.remove('active');
  }
  document.getElementById('contactModal').addEventListener('click', function(e) {
    if (e.target === this) closeContactModal();
  });
</script>
