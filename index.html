<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    min-height: 100vh;
    background: #7D86B3;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .card-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
  }
  .card-img {
    width: 100%;
    display: block;
  }
  .hotspots {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .hotspot {
    position: absolute;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(255,255,255,0.05);
    border-radius: 8px;
    transition: background .15s;
  }
  .hotspot:active { background: rgba(255,255,255,.08); }
  .hs-email     { left:11.1%; top:46.6%; width:77.8%; height:4.4%; }
  .hs-instagram { left:11.1%; top:53.3%; width:77.8%; height:4.4%; }
  .hs-tiktok    { left:11.1%; top:60.1%; width:77.8%; height:4.4%; }
  .hs-website   { left:11.1%; top:66.9%; width:77.8%; height:4.4%; }
  .hs-save      { left:5.1%;  top:80.1%; width:89.8%; height:5.7%; border-radius:50px; }
  .hs-share     { left:5.1%;  top:86.9%; width:89.8%; height:5.7%; border-radius:50px; }
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(75,70,65,.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 2rem;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #F8F5F2;
    border-radius: 1.5rem;
    padding: 2rem;
    max-width: 340px; width: 100%;
    text-align: center;
    box-shadow: 0 16px 48px rgba(125,134,179,.3);
  }
  .modal h3 {
    font-family: Georgia, serif;
    font-size: 1.5rem;
    color: #4B4641;
    margin-bottom: .5rem;
    font-weight: 400;
  }
  .modal p {
    font-size: .85rem;
    color: #7A6B63;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }
  .modal-btns { display: flex; flex-direction: column; gap: .6rem; }
  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: .9rem 1.5rem;
    background: #7D86B3;
    color: #F4EBE5;
    border: none;
    border-radius: 3rem;
    font-size: .85rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
  }
  .btn-close {
    background: transparent;
    border: 1px solid rgba(125,134,179,.3);
    color: #7A6B63;
    padding: .6rem;
    border-radius: 2rem;
    font-size: .8rem;
    cursor: pointer;
    font-family: inherit;
    margin-top: .2rem;
  }
</style>
</head>

<script>
  async function shareCard() {
    const shareData = {
      title: 'Melissa | Brand Glow Studio',
      text: "Check out Melissa's card from Brand Glow Studio!",
      url: window.location.href
    };
    if (navigator.share) {
      try { await navigator.share(shareData); } catch(e) { copyLink(); }
    } else { copyLink(); }
  }
  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => { alert('Link copied!'); });
  }
  function openContactModal() {
    document.getElementById('contactModal').classList.add('active');
  }
  function closeContactModal() {
    document.getElementById('contactModal').classList.remove('active');
  }
  document.getElementById('contactModal').addEventListener('click', function(e) {
    if (e.target === this) closeContactModal();
  });
</script>
